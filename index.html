<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="text/javascript">
      (function (location) {
        if (location.search[1] !== "/") return;

        const decoded = location.search
          .slice(1)
          .split("&")
          .map((segment) => segment.replace(/~and~/g, "&"))
          .join("?");

        window.history.replaceState(null, "", location.pathname.slice(0, -1) + decoded + location.hash);
      })(window.location);
    </script>
    <title>STARLight</title>
    <meta name="description" content="Resource triage tool for the STAR program" />
    <meta name="author" content="STARLight" />

    <meta property="og:title" content="STARLight" />
    <meta property="og:description" content="Resource triage tool for the STAR program" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
